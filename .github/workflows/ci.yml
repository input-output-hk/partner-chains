name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
jobs:
  build:
    runs-on: nixos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: build
        run: nix develop -c bash -c "cargo build && cargo test && cargo clippy"
